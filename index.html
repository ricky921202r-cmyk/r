<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>琉球旅遊計畫</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, 'Noto Serif TC', serif; background: #c4eff5; color: #5a4a3a; min-height: 100vh; }
    #toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 20px; font-size: 13px; color: #fff; z-index: 999; box-shadow: 0 4px 16px rgba(0,0,0,0.15); display: none; white-space: nowrap; }
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    #modal-overlay.show { display: flex; }
    #modal-box { background: #fff; border-radius: 20px; padding: 28px 24px; width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    #modal-box .icon { font-size: 20px; margin-bottom: 6px; }
    #modal-box h3 { font-size: 16px; color: #6b5240; margin-bottom: 6px; }
    #modal-box p { font-size: 12px; color: #9e8570; margin-bottom: 16px; }
    #modal-password { width: 100%; padding: 12px 14px; border: 1.5px solid #e0cdb4; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 12px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit; }
    #modal-cancel { background: #f0e8dc; color: #8a6a4a; }
    #modal-confirm { background: #b8966a; color: #fff; font-weight: 600; }
    header { background: #c4eff5; text-align: center; padding: 40px 20px 24px; border-bottom: 1px solid #e8d8c4; }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; color: #6b5240; margin-bottom: 6px; }
    header .date { font-size: 14px; color: #9e8570; margin-bottom: 6px; }
    header .sync-info { font-size: 11px; color: #c0a880; }
    main { padding: 20px 16px 0; max-width: 480px; margin: 0 auto; }
    .nav-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .nav-btn { padding: 8px 16px; border: 1.5px solid #c9a87a; border-radius: 20px; background: transparent; color: #8a6a4a; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .nav-btn.active { background: #b8966a; color: #fff; border-color: #b8966a; }
    #nav-info { background: #fff8f0; border: 1px solid #e0c9a8; border-radius: 12px; padding: 16px; margin-top: 10px; font-size: 13px; color: #7a5c3a; line-height: 1.8; display: none; }
    #nav-info.show { display: block; }
    .section-title { text-align: center; margin: 20px 0 12px; font-size: 13px; color: #b09070; }
    #day-selector { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
    .day-btn { width: 64px; padding: 10px 0; border-radius: 12px; border: 1.5px solid #d4b896; background: #fff; color: #8a6a4a; cursor: pointer; text-align: center; font-family: inherit; transition: all 0.2s; }
    .day-btn.active { background: #b8966a; color: #fff; border-color: #b8966a; }
    .day-btn .day-num { font-size: 11px; margin-bottom: 2px; }
    .day-btn .day-date { font-size: 14px; font-weight: bold; }
    .day-btn .day-week { font-size: 11px; margin-top: 2px; }
    #day-card { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 20px rgba(180,140,100,0.10); margin-bottom: 30px; }
    #day-card h2 { font-size: 20px; font-weight: 700; color: #6b5240; margin-bottom: 4px; }
    #day-hotel { font-size: 13px; color: #9e8570; margin-bottom: 20px; }
    #schedule-list { margin-bottom: 20px; }
    .schedule-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f0e8dc; }
    .schedule-time { background: #b8966a; color: #fff; border-radius: 8px; padding: 4px 10px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .schedule-info { flex: 1; }
    .schedule-activity { font-size: 14px; color: #5a4a3a; font-weight: 600; }
    .schedule-location { font-size: 12px; color: #9e8570; margin-top: 2px; }
    .schedule-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 0; }
    #empty-msg { font-size: 13px; color: #c0a880; text-align: center; padding: 12px 0; margin-bottom: 16px; }
    #loading-msg { font-size: 13px; color: #c0a880; text-align: center; padding: 20px 0; }
    #add-form { background: #faf6f0; border-radius: 14px; padding: 18px; }
    #add-form .form-title { font-size: 14px; font-weight: 600; color: #7a5c3a; margin-bottom: 12px; }
    #add-form input { width: 100%; padding: 12px 14px; border: 1px solid #e0cdb4; border-radius: 10px; margin-bottom: 10px; font-size: 13px; color: #5a4a3a; background: #fff; outline: none; font-family: inherit; }
    #btn-add { width: 100%; padding: 12px; background: #f56262; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 4px; transition: background 0.2s; }
    #btn-add:disabled { background: #f5a0a0; cursor: not-allowed; }
    #pwd-saved { font-size: 11px; color: #9e8570; text-align: center; margin-top: 8px; display: none; }
    /* 匯率 */
    .rate-card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 2px 8px rgba(180,140,100,0.1); }
    .rate-card-title { font-size: 15px; font-weight: 700; color: #6b5240; margin-bottom: 4px; }
    .rate-updated { font-size: 11px; color: #c0a880; margin-bottom: 14px; }
    .rate-table { width: 100%; border-collapse: collapse; }
    .rate-table th { font-size: 11px; color: #9e8570; text-align: right; padding: 0 0 8px; font-weight: normal; }
    .rate-table th:first-child { text-align: left; }
    .rate-table td { font-size: 14px; color: #5a4a3a; padding: 8px 0; border-top: 1px solid #f0e8dc; text-align: right; }
    .rate-table td:first-child { text-align: left; }
    .rate-name { font-weight: 600; color: #6b5240; }
    .rate-code { font-size: 11px; color: #9e8570; display: block; }
    .rate-sell { color: #b8966a; font-weight: 700; }
    .rate-loading { text-align: center; color: #c0a880; font-size: 13px; padding: 16px 0; }
    .rate-calc { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f0e8dc; }
    .rate-calc-title { font-size: 13px; color: #7a5c3a; font-weight: 600; margin-bottom: 10px; }
    .calc-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .calc-row input { flex: 1; padding: 10px 12px; border: 1px solid #e0cdb4; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; color: #5a4a3a; }
    .calc-row select { padding: 10px 8px; border: 1px solid #e0cdb4; border-radius: 10px; font-size: 13px; outline: none; font-family: inherit; color: #5a4a3a; background: #fff; }
    .calc-result { background: #f0e8dc; border-radius: 10px; padding: 12px 14px; font-size: 14px; color: #6b5240; font-weight: 600; text-align: center; }
  </style>
</head>
<body>

<div id="toast"></div>

<div id="modal-overlay">
  <div id="modal-box">
    <div class="icon">🔐</div>
    <h3>請輸入密碼</h3>
    <p>需要密碼才能新增或刪除行程</p>
    <input type="password" id="modal-password" placeholder="輸入密碼" />
    <div class="modal-btns">
      <button id="modal-cancel">取消</button>
      <button id="modal-confirm">確認</button>
    </div>
  </div>
</div>

<header>
  <h1>琉球旅遊計畫</h1>
  <div class="date">2026年8月11日 – 15日</div>
  <div class="sync-info">🌐 共享行程・每10秒自動同步・🔐 需密碼才能編輯</div>
</header>

<main>
  <div class="nav-row">
    <button class="nav-btn" data-info="行前準備">行前準備</button>
    <button class="nav-btn" data-info="機票資訊">機票資訊</button>
    <button class="nav-btn" data-info="必備APP">必備APP</button>
    <button class="nav-btn" data-info="旅遊須知">旅遊須知</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" data-info="匯率換算">匯率換算</button>
    <button class="nav-btn" data-info="支付優惠">支付優惠</button>
    <button class="nav-btn" data-info="退稅資訊">退稅資訊</button>
    <button class="nav-btn" data-info="購物指南">購物指南</button>
  </div>

  <div id="nav-info"></div>

  <div class="section-title">行程日期</div>

  <div id="day-selector">
    <button class="day-btn active" data-day="1"><div class="day-num">第1天</div><div class="day-date">8/11</div><div class="day-week">週二</div></button>
    <button class="day-btn" data-day="2"><div class="day-num">第2天</div><div class="day-date">8/12</div><div class="day-week">週三</div></button>
    <button class="day-btn" data-day="3"><div class="day-num">第3天</div><div class="day-date">8/13</div><div class="day-week">週四</div></button>
    <button class="day-btn" data-day="4"><div class="day-num">第4天</div><div class="day-date">8/14</div><div class="day-week">週五</div></button>
    <button class="day-btn" data-day="5"><div class="day-num">第5天</div><div class="day-date">8/15</div><div class="day-week">週六</div></button>
  </div>

  <div id="day-card">
    <h2 id="day-title"></h2>
    <div id="day-hotel"></div>
    <div id="loading-msg">載入中…</div>
    <div id="empty-msg" style="display:none">尚無行程，快來新增吧！</div>
    <div id="schedule-list"></div>
    <div id="add-form">
      <div class="form-title">🔐 新增行程（需密碼）</div>
      <input type="text" id="input-time" placeholder="時間（例如：14:30）" />
      <input type="text" id="input-activity" placeholder="活動內容" />
      <input type="text" id="input-location" placeholder="地點（選填）" />
      <button id="btn-add">＋ 新增</button>
      <div id="pwd-saved">🔓 密碼已記住（本次瀏覽有效）</div>
    </div>
  </div>
</main>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbygSS1gLISj2TbelKSQAEmN1hz0LSzSHjeIS3j8LWIqx3m6GpfgOC9T_0hapeHvRcSTgg/exec";

const dayData = {
  1: { title: "抵達琉球", hotel: "住宿：那霸市區飯店" },
  2: { title: "首里城 & 國際通", hotel: "住宿：那霸市區飯店" },
  3: { title: "美麗海水族館", hotel: "住宿：那霸市區飯店" },
  4: { title: "離島探索", hotel: "住宿：那霸市區飯店" },
  5: { title: "返回台灣", hotel: "" },
};

let selectedDay = 1;
let schedules = {};
let savedPassword = "";
let pendingAction = null;
let saving = false;
let cachedRates = null;

function callScript(params) {
  return new Promise((resolve, reject) => {
    const cbName = "cb_" + Date.now();
    const url = SCRIPT_URL + "?" + new URLSearchParams({ ...params, callback: cbName });
    const script = document.createElement("script");
    const timeout = setTimeout(() => { cleanup(); reject(new Error("逾時，請檢查網路")); }, 15000);
    window[cbName] = (data) => { cleanup(); resolve(data); };
    function cleanup() { clearTimeout(timeout); delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); }
    script.onerror = () => { cleanup(); reject(new Error("網路錯誤")); };
    script.src = url;
    document.head.appendChild(script);
  });
}

function showToast(msg, color = "#6b9e6b") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.background = color; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 3000);
}

function renderSchedules() {
  const list = document.getElementById("schedule-list");
  const emptyMsg = document.getElementById("empty-msg");
  document.getElementById("loading-msg").style.display = "none";
  const items = (schedules[selectedDay] || []).slice().sort((a, b) => a.time.localeCompare(b.time));
  if (items.length === 0) {
    emptyMsg.style.display = "block"; list.innerHTML = "";
  } else {
    emptyMsg.style.display = "none";
    list.innerHTML = items.map(item => `
      <div class="schedule-item">
        <div class="schedule-time">${item.time}</div>
        <div class="schedule-info">
          <div class="schedule-activity">${item.activity}</div>
          ${item.location ? `<div class="schedule-location">📍 ${item.location}</div>` : ""}
        </div>
        <button class="schedule-delete" data-id="${item.id}">✕</button>
      </div>`).join("");
    list.querySelectorAll(".schedule-delete").forEach(btn => {
      btn.addEventListener("click", () => handleDelete(btn.dataset.id));
    });
  }
}

function updateDayCard() {
  const d = dayData[selectedDay];
  const dates = ["8/11","8/12","8/13","8/14","8/15"];
  const weeks = ["週二","週三","週四","週五","週六"];
  document.getElementById("day-title").textContent = `第${selectedDay}天 – ${dates[selectedDay-1]}（${weeks[selectedDay-1].slice(1)}）${d.title}`;
  const hotel = document.getElementById("day-hotel");
  hotel.textContent = d.hotel;
  hotel.style.display = d.hotel ? "block" : "none";
}

async function fetchSchedules() {
  try {
    const json = await callScript({ action: "get" });
    const grouped = {};
    (json.data || []).forEach(row => {
      const d = parseInt(row.day);
      if (!grouped[d]) grouped[d] = [];
      grouped[d].push({ id: String(row.id), time: String(row.time), activity: row.activity, location: row.location || "" });
    });
    schedules = grouped;
    renderSchedules();
  } catch (e) {
    showToast("讀取失敗：" + e.message, "#c0705a");
    document.getElementById("loading-msg").style.display = "none";
  }
}

async function executeAction(action, pwd) {
  saving = true;
  document.getElementById("btn-add").disabled = true;
  document.getElementById("btn-add").textContent = "處理中…";
  try {
    const json = await callScript({ ...action, password: pwd });
    if (json.success) {
      savedPassword = pwd;
      document.getElementById("pwd-saved").style.display = "block";
      if (action.action === "add") {
        document.getElementById("input-time").value = "";
        document.getElementById("input-activity").value = "";
        document.getElementById("input-location").value = "";
        showToast("✓ 行程已儲存！");
      } else { showToast("✓ 行程已刪除"); }
      await fetchSchedules();
    } else {
      if (json.error === "密碼錯誤") {
        savedPassword = "";
        document.getElementById("pwd-saved").style.display = "none";
        showToast("❌ 密碼錯誤", "#c0705a");
        pendingAction = action; openModal();
      } else { showToast("❌ " + (json.error || "操作失敗"), "#c0705a"); }
    }
  } catch (e) {
    showToast("操作失敗：" + e.message, "#c0705a");
  } finally {
    saving = false;
    document.getElementById("btn-add").disabled = false;
    document.getElementById("btn-add").textContent = "＋ 新增";
  }
}

function handleAdd() {
  const time = document.getElementById("input-time").value.trim();
  const activity = document.getElementById("input-activity").value.trim();
  const location = document.getElementById("input-location").value.trim();
  if (!time || !activity) { showToast("請填寫時間與活動內容", "#c0705a"); return; }
  const action = { action: "add", day: selectedDay, time, activity, location };
  if (savedPassword) { executeAction(action, savedPassword); }
  else { pendingAction = action; openModal(); }
}

function handleDelete(id) {
  const action = { action: "delete", id };
  if (savedPassword) { executeAction(action, savedPassword); }
  else { pendingAction = action; openModal(); }
}

function openModal() {
  document.getElementById("modal-password").value = "";
  document.getElementById("modal-overlay").classList.add("show");
  setTimeout(() => document.getElementById("modal-password").focus(), 100);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("show");
  pendingAction = null;
}

function confirmModal() {
  const pwd = document.getElementById("modal-password").value;
  if (!pwd) { showToast("請輸入密碼", "#c0705a"); return; }
  document.getElementById("modal-overlay").classList.remove("show");
  executeAction(pendingAction, pwd);
  pendingAction = null;
}

// ===== 匯率 =====
function calcRate() {
  if (!cachedRates) return;
  const amount = parseFloat(document.getElementById("calc-amount").value) || 0;
  const code = document.getElementById("calc-currency").value;
  const rate = cachedRates.find(r => r.code === code);
  if (!rate) return;
  const twdToForeign = (amount / parseFloat(rate.sell)).toFixed(2);
  const foreignToTwd = (amount * parseFloat(rate.sell)).toFixed(0);
  document.getElementById("calc-result").innerHTML = `
    <div style="margin-bottom:6px;">台幣 ${amount.toLocaleString()} 元 ＝ ${twdToForeign} ${code}</div>
    <div>${amount} ${code} ＝ 台幣 ${parseInt(foreignToTwd).toLocaleString()} 元</div>`;
}

function buildRateHtml(rates, updatedAt) {
  const options = rates.map(r => `<option value="${r.code}">${r.name}（${r.code}）</option>`).join("");
  const rows = rates.map(r => `
    <tr>
      <td><span class="rate-name">${r.name}</span><span class="rate-code">${r.code}</span></td>
      <td>${r.buy}</td>
      <td class="rate-sell">${r.sell}</td>
    </tr>`).join("");
  return `<div class="rate-card">
    <div class="rate-card-title">💱 台灣銀行即時匯率</div>
    <div class="rate-updated">更新時間：${updatedAt || "載入中"}</div>
    <table class="rate-table">
      <thead><tr><th>幣別</th><th>買入</th><th>賣出</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="rate-calc">
      <div class="rate-calc-title">💰 快速換算</div>
      <div class="calc-row">
        <input type="number" id="calc-amount" placeholder="輸入金額" oninput="calcRate()" />
        <select id="calc-currency" onchange="calcRate()">${options}</select>
      </div>
      <div class="calc-result" id="calc-result">輸入金額後自動換算</div>
    </div>
  </div>`;
}

// ===== Nav 按鈕內容 =====
function getNavContent(name) {
  if (name === "機票資訊") {
    return `<div style="display:flex;flex-direction:column;gap:16px;">
      <div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(180,140,100,0.1)">
        <div style="font-size:15px;font-weight:700;color:#6b5240;margin-bottom:12px;">✈️ 去程 Outbound</div>
        <div style="font-size:13px;color:#7a5c3a;margin-bottom:4px;">日期：2026/08/11</div>
        <div style="font-size:13px;color:#7a5c3a;margin-bottom:12px;">航班：星宇航空 JX870</div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div><div style="font-size:11px;color:#9e8570;">起飛</div><div style="font-size:22px;font-weight:700;color:#b8966a;">12:00</div><div style="font-size:12px;color:#9e8570;">桃園 T1</div></div>
          <div style="color:#c9a87a;font-size:20px;">→</div>
          <div style="text-align:right;"><div style="font-size:11px;color:#9e8570;">抵達</div><div style="font-size:22px;font-weight:700;color:#b8966a;">14:40</div><div style="font-size:12px;color:#9e8570;">那霸 國際航廈</div></div>
        </div>
      </div>
      <div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(180,140,100,0.1)">
        <div style="font-size:15px;font-weight:700;color:#6b5240;margin-bottom:12px;">🛬 回程 Return</div>
        <div style="font-size:13px;color:#7a5c3a;margin-bottom:4px;">日期：2026/08/15</div>
        <div style="font-size:13px;color:#7a5c3a;margin-bottom:12px;">航班：星宇航空 JX870</div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div><div style="font-size:11px;color:#9e8570;">起飛</div><div style="font-size:22px;font-weight:700;color:#b8966a;">15:50</div><div style="font-size:12px;color:#9e8570;">那霸 國際航廈</div></div>
          <div style="color:#c9a87a;font-size:20px;">→</div>
          <div style="text-align:right;"><div style="font-size:11px;color:#9e8570;">抵達</div><div style="font-size:22px;font-weight:700;color:#b8966a;">16:25</div><div style="font-size:12px;color:#9e8570;">桃園 T1</div></div>
        </div>
      </div>
    </div>`;
  }

  if (name === "匯率換算") {
    if (cachedRates) {
      return buildRateHtml(cachedRates, null);
    }
    (async () => {
      const info = document.getElementById("nav-info");
      try {
        const json = await callScript({ action: "rate" });
        // 確認使用者還在看匯率頁才更新，避免覆蓋其他按鈕內容
        const activeBtn = document.querySelector(".nav-btn.active");
        if (!activeBtn || activeBtn.dataset.info !== "匯率換算") return;
        if (json.success && json.rates) {
          cachedRates = json.rates;
          info.innerHTML = buildRateHtml(json.rates, json.updatedAt);
        } else {
          info.innerHTML = `<div style="color:#c0705a;font-size:13px;">❌ 匯率載入失敗，請稍後再試</div>`;
        }
      } catch (e) {
        const activeBtn = document.querySelector(".nav-btn.active");
        if (!activeBtn || activeBtn.dataset.info !== "匯率換算") return;
        info.innerHTML = `<div style="color:#c0705a;font-size:13px;">❌ 載入失敗：${e.message}</div>`;
      }
    })();
    return `<div class="rate-card"><div class="rate-loading">⏳ 載入台灣銀行即時匯率中…</div></div>`;
  }

  if (name === "行前準備") {
    return `<div style="background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(180,140,100,0.1)">
      <div style="font-size:18px;font-weight:700;color:#6b5240;margin-bottom:16px;">行前準備 Preparation</div>

      <div style="font-size:13px;font-weight:700;color:#b8966a;margin-bottom:10px;">行李清單</div>
      ${["護照、錢包、現金與信用卡","衣物：厚暖外套、內搭、圍巾、手套、帽子、雪靴（或冰爪）、暖暖包","滑雪裝備：排汗衣褲、墨鏡、雪襪","3C：手機、行動電源（注意要有Wh標示）、相機、轉接頭、充電線","肌膚保養：強保濕產品、護唇膏、防曬","個人藥品"].map((item, i) => `
        <label style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f5f0eb;cursor:pointer;">
          <input type="checkbox" id="chk_luggage_${i}" style="margin-top:3px;width:16px;height:16px;accent-color:#b8966a;flex-shrink:0;" />
          <span style="font-size:13px;color:#5a4a3a;">${item}</span>
        </label>`).join("")}

      <div style="font-size:13px;font-weight:700;color:#b8966a;margin:16px 0 10px;">旅遊保險</div>
      ${["旅平險/旅行不便險"].map((item, i) => `
        <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fdf8f0;border-radius:8px;margin-bottom:6px;cursor:pointer;">
          <input type="checkbox" id="chk_insurance_${i}" style="width:16px;height:16px;accent-color:#b8966a;flex-shrink:0;" />
          <span style="font-size:13px;color:#5a4a3a;">${item}</span>
        </label>`).join("")}

      <div style="font-size:13px;font-weight:700;color:#b8966a;margin:16px 0 10px;">護照</div>
      ${["確保效期滿 6 個月以上"].map((item, i) => `
        <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fdf8f0;border-radius:8px;margin-bottom:6px;cursor:pointer;">
          <input type="checkbox" id="chk_passport_${i}" style="width:16px;height:16px;accent-color:#b8966a;flex-shrink:0;" />
          <span style="font-size:13px;color:#5a4a3a;">${item}</span>
        </label>`).join("")}

      <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f0e8dc;">
        <div style="font-size:13px;font-weight:700;color:#7a5c3a;margin-bottom:8px;">📧 寄送清單到我的 Gmail</div>
        <div style="display:flex;gap:8px;">
          <input type="email" id="gmail-input" placeholder="輸入你的 Gmail" style="flex:1;padding:10px 12px;border:1px solid #e0cdb4;border-radius:10px;font-size:13px;outline:none;font-family:inherit;color:#5a4a3a;" />
          <button onclick="sendChecklist()" style="padding:10px 16px;background:#b8966a;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;">寄送</button>
        </div>
        <div id="gmail-result" style="font-size:12px;color:#9e8570;margin-top:6px;"></div>
      </div>
    </div>`;
  }
  if (name === "必備APP") return `必備APP的相關資訊測試中。`;
  if (name === "旅遊須知") return `旅遊須知的相關資訊測試中。`;
  if (name === "支付優惠") return `支付優惠的相關資訊測試中。`;
  if (name === "退稅資訊") return `退稅資訊的相關資訊測試中。`;
  if (name === "購物指南") return `購物指南的相關資訊測試中。`;
  

  return `${name} 的相關資訊測試中。`;
}

// ===== 寄送行前清單到 Gmail =====
async function sendChecklist() {
  const email = document.getElementById("gmail-input").value.trim();
  const resultEl = document.getElementById("gmail-result");
  if (!email || !email.includes("@")) {
    resultEl.style.color = "#c0705a";
    resultEl.textContent = "請輸入正確的 Gmail 地址";
    return;
  }

  // 收集勾選項目
  const allItems = [
    { id: "chk_luggage_0", text: "護照、錢包、現金與信用卡" },
    { id: "chk_luggage_1", text: "衣物：厚暖外套、內搭、圍巾、手套、帽子、雪靴（或冰爪）、暖暖包" },
    { id: "chk_luggage_2", text: "滑雪裝備：排汗衣褲、墨鏡、雪襪" },
    { id: "chk_luggage_3", text: "3C：手機、行動電源、相機、轉接頭、充電線" },
    { id: "chk_luggage_4", text: "肌膚保養：強保濕產品、護唇膏、防曬" },
    { id: "chk_luggage_5", text: "個人藥品" },
    { id: "chk_insurance_0", text: "旅平險/旅行不便險" },
    { id: "chk_passport_0", text: "確保效期滿 6 個月以上" },
  ];

  const checked = allItems.filter(item => {
    const el = document.getElementById(item.id);
    return el && el.checked;
  }).map(item => "✅ " + item.text);

  const unchecked = allItems.filter(item => {
    const el = document.getElementById(item.id);
    return el && !el.checked;
  }).map(item => "⬜ " + item.text);

  resultEl.style.color = "#9e8570";
  resultEl.textContent = "寄送中…";

  try {
    const json = await callScript({
      action: "sendMail",
      to: email,
      subject: "琉球旅遊行前準備清單",
      checkedItems: checked.join("||"),
      uncheckedItems: unchecked.join("||"),
    });
    if (json.success) {
      resultEl.style.color = "#6b9e6b";
      resultEl.textContent = "✓ 已寄送到 " + email;
    } else {
      resultEl.style.color = "#c0705a";
      resultEl.textContent = "❌ 寄送失敗：" + (json.error || "請稍後再試");
    }
  } catch (e) {
    resultEl.style.color = "#c0705a";
    resultEl.textContent = "❌ 寄送失敗：" + e.message;
  }
}

document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const info = document.getElementById("nav-info");
    if (btn.classList.contains("active")) {
      btn.classList.remove("active");
      info.classList.remove("show");
    } else {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      info.innerHTML = getNavContent(btn.dataset.info);
      info.classList.add("show");
    }
  });
});

document.querySelectorAll(".day-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedDay = parseInt(btn.dataset.day);
    updateDayCard();
    renderSchedules();
  });
});

document.getElementById("btn-add").addEventListener("click", handleAdd);
document.getElementById("input-location").addEventListener("keydown", e => { if (e.key === "Enter") handleAdd(); });
document.getElementById("modal-cancel").addEventListener("click", closeModal);
document.getElementById("modal-confirm").addEventListener("click", confirmModal);
document.getElementById("modal-password").addEventListener("keydown", e => { if (e.key === "Enter") confirmModal(); });

updateDayCard();
fetchSchedules();
setInterval(fetchSchedules, 10000);
</script>
